<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CobraTusAyudas - Dashboard Admin</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0f;--surface:#12121a;--border:#1e1e2e;--accent:#00e5a0;--accent2:#7c6af7;--text:#e8e8f0;--muted:#5a5a7a;--danger:#ff4757;--warning:#ffa502}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 0%,rgba(0,229,160,.08),transparent 60%)}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:48px;width:100%;max-width:380px;text-align:center}
.login-logo{font-size:13px;font-family:'DM Mono',monospace;color:var(--accent);letter-spacing:3px;text-transform:uppercase;margin-bottom:8px}
.login-title{font-size:22px;font-weight:600;margin-bottom:32px}
.login-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px 16px;color:var(--text);font-size:15px;font-family:'DM Mono',monospace;margin-bottom:16px;outline:none}
.login-input:focus{border-color:var(--accent)}
.login-btn{width:100%;background:var(--accent);color:#000;border:none;border-radius:8px;padding:13px;font-size:15px;font-weight:600;cursor:pointer}
.login-error{color:var(--danger);font-size:13px;margin-top:12px}
#dashboard{display:none}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 32px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:10}
.topbar-logo{font-family:'DM Mono',monospace;font-size:12px;color:var(--accent);letter-spacing:3px;text-transform:uppercase}
.topbar-r{display:flex;gap:12px;align-items:center}
.btn-sm{background:var(--border);color:var(--text);border:none;border-radius:8px;padding:8px 16px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif}
.btn-out{background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:8px;padding:8px 16px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif}
.btn-out:hover{color:var(--danger);border-color:var(--danger)}
.main{padding:32px;max-width:1400px;margin:0 auto}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:32px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent)}
.kpi.p::before{background:var(--accent2)}.kpi.o::before{background:var(--warning)}.kpi.r::before{background:var(--danger)}
.kpi-lbl{font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}
.kpi-val{font-size:36px;font-weight:600;line-height:1;margin-bottom:6px}
.kpi-sub{font-size:12px;color:var(--muted)}
.charts{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:32px}
.chart{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px}
.chart-ttl{font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:20px}
.bars{display:flex;flex-direction:column;gap:10px}
.bar-row{display:flex;align-items:center;gap:12px}
.bar-lbl{font-size:12px;color:var(--text);width:110px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;background:var(--accent);border-radius:3px}
.bar-fill.p{background:var(--accent2)}
.bar-n{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);width:28px;text-align:right}
.filters{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.f-lbl{font-size:12px;font-family:'DM Mono',monospace;color:var(--muted)}
.f-sel{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px;outline:none}
.f-tog{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.f-tog button{background:transparent;border:none;color:var(--muted);padding:8px 14px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif}
.f-tog button.on{background:var(--accent);color:#000;font-weight:600}
.tbl-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:32px}
.tbl-hdr{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border)}
.tbl-ttl{font-size:14px;font-weight:600;font-family:'DM Mono',monospace;color:var(--accent)}
.tbl-cnt{font-size:12px;color:var(--muted);font-family:'DM Mono',monospace}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{padding:12px 16px;text-align:left;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;border-bottom:1px solid var(--border);white-space:nowrap}
tbody tr{border-bottom:1px solid var(--border)}
tbody tr:hover{background:rgba(255,255,255,.02)}
tbody td{padding:12px 16px;white-space:nowrap}
.badge{display:inline-block;padding:3px 8px;border-radius:4px;font-size:11px;font-family:'DM Mono',monospace}
.paid{background:rgba(0,229,160,.15);color:var(--accent)}
.unpaid{background:rgba(90,90,122,.2);color:var(--muted)}
.mono{font-family:'DM Mono',monospace;color:var(--accent);font-size:12px}
.sm{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace}
.loading,.empty{text-align:center;padding:48px;color:var(--muted);font-family:'DM Mono',monospace;font-size:13px}
@media(max-width:768px){.main{padding:16px}.charts{grid-template-columns:1fr}.topbar{padding:12px 16px}}
</style>
</head>
<body>
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">CobraTusAyudas</div>
    <div class="login-title">Dashboard Admin</div>
    <input type="password" class="login-input" id="pwd" placeholder="Contrasena" onkeydown="if(event.key==='Enter')login()"/>
    <button class="login-btn" onclick="login()">Entrar</button>
    <div class="login-error" id="err"></div>
  </div>
</div>
<div id="dashboard">
  <div class="topbar">
    <div class="topbar-logo">CobraTusAyudas / Admin</div>
    <div class="topbar-r">
      <span id="upd" class="sm"></span>
      <button class="btn-sm" onclick="load()">Actualizar</button>
      <button class="btn-out" onclick="logout()">Salir</button>
    </div>
  </div>
  <div class="main">
    <div class="kpi-grid">
      <div class="kpi"><div class="kpi-lbl">Total Usuarios</div><div class="kpi-val" id="k1">-</div><div class="kpi-sub">Han rellenado el quiz</div></div>
      <div class="kpi p"><div class="kpi-lbl">Han Pagado</div><div class="kpi-val" id="k2">-</div><div class="kpi-sub" id="k2s">-</div></div>
      <div class="kpi o"><div class="kpi-lbl">Ingresos</div><div class="kpi-val" id="k3">-</div><div class="kpi-sub">x 6 EUR por pago</div></div>
      <div class="kpi r"><div class="kpi-lbl">Hoy</div><div class="kpi-val" id="k4">-</div><div class="kpi-sub" id="k4s">-</div></div>
    </div>
    <div class="charts">
      <div class="chart"><div class="chart-ttl">Por Comunidad Autonoma</div><div class="bars" id="c1"><div class="loading">Cargando...</div></div></div>
      <div class="chart"><div class="chart-ttl">Por Situacion Laboral</div><div class="bars" id="c2"><div class="loading">Cargando...</div></div></div>
      <div class="chart"><div class="chart-ttl">Por Ingresos</div><div class="bars" id="c3"><div class="loading">Cargando...</div></div></div>
      <div class="chart"><div class="chart-ttl">Por Familia</div><div class="bars" id="c4"><div class="loading">Cargando...</div></div></div>
    </div>
    <div class="filters">
      <span class="f-lbl">Filtrar:</span>
      <select class="f-sel" id="fCCAA" onchange="filter()">
        <option value="">Todas CCAA</option>
        <option value="andalucia">Andalucia</option><option value="cataluna">Catalunya</option>
        <option value="madrid">Madrid</option><option value="valencia">Valencia</option>
        <option value="galicia">Galicia</option><option value="euskadi">Pais Vasco</option>
        <option value="aragon">Aragon</option><option value="castilla-leon">Castilla y Leon</option>
        <option value="canarias">Canarias</option><option value="asturias">Asturias</option>
        <option value="murcia">Murcia</option><option value="baleares">Baleares</option>
        <option value="extremadura">Extremadura</option><option value="cantabria">Cantabria</option>
        <option value="rioja">La Rioja</option><option value="navarra">Navarra</option>
      </select>
      <select class="f-sel" id="fL" onchange="filter()">
        <option value="">Todo laboral</option>
        <option value="empleado">Empleado/a</option><option value="autonomo">Autonomo/a</option>
        <option value="desempleado">Desempleado/a</option><option value="jubilado">Jubilado/a</option>
      </select>
      <div class="f-tog">
        <button class="on" id="ba" onclick="pf('all')">Todos</button>
        <button id="bp" onclick="pf('paid')">Pagados</button>
        <button id="bu" onclick="pf('unpaid')">Pendientes</button>
      </div>
    </div>
    <div class="tbl-box">
      <div class="tbl-hdr"><div class="tbl-ttl">Registros</div><div class="tbl-cnt" id="tc">-</div></div>
      <div id="tw"><div class="loading">Cargando...</div></div>
    </div>
  </div>
</div>
<script>
const URL_SB='https://hsojuxicjstzkhitudow.supabase.co';
const KEY_SB='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhzb2p1eGljanN0emtoaXR1ZG93Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczOTg5MjgsImV4cCI6MjA5Mjk3NDkyOH0.D9gID0pJEttmYgq_rafuJXZOklYZy2m7PzuNZ6BTt6M';
const PWD='cobra2025admin';
let sb,rows=[],paidF='all';
const lCC={cataluna:'Catalunya',madrid:'Madrid',andalucia:'Andalucia',valencia:'Valencia',galicia:'Galicia',euskadi:'P.Vasco',aragon:'Aragon','castilla-leon':'C.y Leon',canarias:'Canarias',extremadura:'Extremadura',asturias:'Asturias',murcia:'Murcia',baleares:'Baleares',cantabria:'Cantabria',rioja:'La Rioja',navarra:'Navarra'};
const lL={empleado:'Empleado/a',autonomo:'Autonomo/a',desempleado:'Busqueda',jubilado:'Jubilado/a',cuidador:'Cuidador/a'};
const lF={'sin-hijos':'Sin hijos',pareja:'En pareja','1hijo':'1 hijo','2hijos':'2 hijos','familia-numerosa':'Fam.numerosa','cuidador-mayor':'Cuida mayor'};
const lI={'<600':'<600EUR','600-1000':'600-1k','1000-2000':'1-2k','2000-3500':'2-3.5k','>3500':'>3.5k'};
function login(){
  if(document.getElementById('pwd').value===PWD){
    document.getElementById('login-screen').style.display='none';
    document.getElementById('dashboard').style.display='block';
    sb=window.supabase.createClient(URL_SB,KEY_SB);
    load();
  }else{document.getElementById('err').textContent='Contrasena incorrecta';}
}
function logout(){document.getElementById('login-screen').style.display='flex';document.getElementById('dashboard').style.display='none';document.getElementById('pwd').value='';}
async function load(){
  const{data}=await sb.from('quiz_responses').select('*').order('created_at',{ascending:false}).limit(500);
  rows=data||[];
  kpis();charts();filter();
  document.getElementById('upd').textContent='Act: '+new Date().toLocaleTimeString('es-ES');
}
function kpis(){
  const total=rows.length,paid=rows.filter(r=>r.pagado).length;
  const today=new Date().toISOString().slice(0,10);
  const td=rows.filter(r=>r.created_at?.slice(0,10)===today);
  document.getElementById('k1').textContent=total;
  document.getElementById('k2').textContent=paid;
  document.getElementById('k2s').textContent=(total?Math.round(paid/total*100):0)+'% conversion';
  document.getElementById('k3').textContent=(paid*6).toLocaleString('es-ES')+'EUR';
  document.getElementById('k4').textContent=td.length;
  document.getElementById('k4s').textContent=td.filter(r=>r.pagado).length+' pagos hoy';
}
function chart(id,field,labels,purple){
  const el=document.getElementById(id),c={};
  rows.forEach(r=>{const v=r[field]||'otro';c[v]=(c[v]||0)+1;});
  const s=Object.entries(c).sort((a,b)=>b[1]-a[1]).slice(0,6),max=s[0]?.[1]||1;
  el.innerHTML=s.length?s.map(([k,v])=>'<div class="bar-row"><div class="bar-lbl">'+(labels[k]||k)+'</div><div class="bar-track"><div class="bar-fill'+(purple?' p':'')+ '" style="width:'+Math.round(v/max*100)+'%"></div></div><div class="bar-n">'+v+'</div></div>').join(''):'<div class="empty">Sin datos</div>';
}
function charts(){chart('c1','ccaa',lCC,false);chart('c2','laboral',lL,true);chart('c3','ingresos',lI,false);chart('c4','familia',lF,true);}
function pf(v){paidF=v;['ba','bp','bu'].forEach((id,i)=>document.getElementById(id).classList.toggle('on',['all','paid','unpaid'][i]===v));filter();}
function filter(){
  const cc=document.getElementById('fCCAA').value,lb=document.getElementById('fL').value;
  const f=rows.filter(r=>{
    if(cc&&r.ccaa!==cc)return false;
    if(lb&&r.laboral!==lb)return false;
    if(paidF==='paid'&&!r.pagado)return false;
    if(paidF==='unpaid'&&r.pagado)return false;
    return true;
  });
  document.getElementById('tc').textContent=f.length+' registros';
  const tw=document.getElementById('tw');
  if(!f.length){tw.innerHTML='<div class="empty">Sin registros</div>';return;}
  tw.innerHTML='<table><thead><tr><th>Fecha</th><th>CCAA</th><th>Edad</th><th>Laboral</th><th>Ingresos</th><th>Familia</th><th>Vivienda</th><th>Ayudas</th><th>Importe</th><th>Estado</th></tr></thead><tbody>'+f.map(r=>'<tr><td class="sm">'+new Date(r.created_at).toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit',year:'2-digit'})+'<br>'+new Date(r.created_at).toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'})+'</td><td>'+(lCC[r.ccaa]||r.ccaa||'-')+'</td><td>'+(r.edad||'-')+'</td><td>'+(lL[r.laboral]||r.laboral||'-')+'</td><td>'+(lI[r.ingresos]||r.ingresos||'-')+'</td><td>'+(lF[r.familia]||r.familia||'-')+'</td><td>'+(r.vivienda||'-')+'</td><td class="mono" style="text-align:center">'+(r.ayudas_count??'-')+'</td><td class="mono">'+(r.importe_min!=null?r.importe_min.toLocaleString('es-ES')+'–':'-')+(r.importe_max!=null?r.importe_max.toLocaleString('es-ES')+'EUR':'')+'</td><td><span class="badge '+(r.pagado?'paid':'unpaid')+'">'+(r.pagado?'Pagado':'Pendiente')+'</span></td></tr>').join('')+'</tbody></table>';
}
</script>
</body>
</html>
